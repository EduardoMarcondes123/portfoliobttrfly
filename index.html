<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio de Ilustração</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" style="position: fixed; top: 10px; right: 10px; z-index: 9999;">🌙</button>
    <header class="hero">
        <h1>Butterfly Drawing</h1>
        <p>Ilustradora & Artista Visual</p>
        <div class="links">
            <a href="mailto:bttrflydrawing2022@gmail.com">Entrar em contato</a>
            <a href="https://instagram.com/bttrfly_drawing" target="_blank">Instagram</a>
        </div>
    </header>

   <main class="gallery-container">
        <div class="gallery">
            <div class="gallery-item"><img src="img/arte1.jpeg" alt="Descrição da arte 1" loading="lazy"></div>
            <div class="gallery-item"><img src="img/arte2.jpeg" alt="Descrição da arte 2" loading="lazy"></div>
            <div class="gallery-item"><img src="img/arte3.jpeg" alt="Descrição da arte 3" loading="lazy"></div>
            <div class="gallery-item"><img src="img/arte4.jpeg" alt="Descrição da arte 4" loading="lazy"></div>
        </div>
    </main>

    <div id="modal-container" class="modal">
        <span class="close-button">&times;</span>
        <button class="nav-button prev" onclick="mudarImagem(-1)">&#10094;</button>
        <img class="modal-content" id="img-ampliada">
        <button class="nav-button next" onclick="mudarImagem(1)">&#10095;</button>
        <div id="caption"></div>
    </div>

    <button id="backToTop">↑</button>

    <meta property="og:title" content="Butterfly Drawing | Portfólio">
    <meta property="og:description" content="Confira as ilustrações e artes visuais de Butterfly Drawing.">
    <script src="script.js"></script>
</body>
</html>
