<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butterfly Drawing | Portfólio & Loja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">🌙</button>

    <div id="aba-home" class="aba ativa">
        <header class="hero">
            <h1>Butterfly Drawing</h1>
            <p>Ilustradora & Artista Visual</p>
            <div class="links">
                <button onclick="abrirAba('portfolio')" class="btn-menu">Ver Portfólio</button>
                <button onclick="abrirAba('loja')" class="btn-loja">Lojinha de Bijus</button>
                <a href="mailto:bttrflydrawing2022@gmail.com">Entrar em contato</a>
                <a href="https://instagram.com/bttrfly_drawing" target="_blank">Instagram</a>
            </div>
        </header>
    </div>

    <div id="aba-portfolio" class="aba">
        <div class="container-aba">
            <button onclick="abrirAba('home')" class="btn-voltar">← Voltar</button>
            <h2 class="titulo-secao">Meu Portfólio</h2>
            <main class="gallery-container">
                <div class="gallery">
                    <div class="gallery-item"><img src="img/arte1.jpeg" alt="Arte 1"></div>
                    <div class="gallery-item"><img src="img/arte2.jpeg" alt="Arte 2"></div>
                    <div class="gallery-item"><img src="img/arte3.jpeg" alt="Arte 3"></div>
                    <div class="gallery-item"><img src="img/arte4.jpeg" alt="Arte 4"></div>
                </div>
            </main>
        </div>
    </div>

    <div id="aba-loja" class="aba">
        <div class="container-aba">
            <button onclick="abrirAba('home')" class="btn-voltar">← Voltar</button>
            <h2 class="titulo-secao">Lojinha Online</h2>
            <div class="grid-produtos">
                <div class="produto-card">
                    <img src="img/produto1.jpeg" alt="Produto 1">
                    <h3>Produto 1</h3>
                    <p class="preco">R$ 35,00</p>
                    <button class="btn-comprar">Comprar via WhatsApp</button>
                </div>
                <div class="produto-card">
                    <img src="img/produto2.jpeg" alt="Produto 2">
                    <h3>Produto 2</h3>
                    <p class="preco">R$ 20,00</p>
                    <button class="btn-comprar">Comprar via WhatsApp</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-container" class="modal">
        <span class="close-button">&times;</span>
        <button class="nav-button prev" onclick="mudarImagem(-1)">&lt;</button>
        <img class="modal-content" id="img-ampliada">
        <button class="nav-button next" onclick="mudarImagem(1)">&gt;</button>
        <div id="caption"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
