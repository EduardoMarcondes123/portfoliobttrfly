<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Chefe | Atelier Mariposa</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #fce4ec; color: #333; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .cabecalho { text-align: center; margin-bottom: 30px; }
        .cabecalho h1 { color: #d81b60; margin: 0; font-size: 32px; }
        
        /* TELA DE LOGIN */
        #tela-login { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        #tela-login input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 16px; }
        #tela-login button { background-color: #d81b60; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; }
        
        /* PAINEL (Escondido por padrão) */
        #painel-conteudo { display: none; width: 100%; max-width: 500px; flex-direction: column; align-items: center; }
        
        .painel-container { background-color: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; text-align: center; margin-bottom: 20px; border-top: 5px solid #d81b60; }
        h2 { margin-top: 0; color: #333; font-size: 22px; }
        .form-grupo { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button.btn-salvar { background-color: #d81b60; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; }
        .aviso { margin-top: 15px; font-size: 14px; font-weight: bold; }
        
        .lista-produtos { width: 100%; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; margin-bottom: 40px; }
        .item-produto { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
        .item-info { display: flex; align-items: center; gap: 15px; text-align: left; }
        .item-info img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        .item-text h4 { margin: 0; font-size: 14px; color: #333; }
        .item-text p { margin: 0; font-size: 12px; color: #d81b60; font-weight: bold; }
        .btn-excluir { background-color: #ff4c4c; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
        hr { border: 0; height: 2px; background-color: #f8bbd0; width: 80%; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="cabecalho">
        <h1>Painel da Chefe 👑🦋</h1>
    </div>

    <div id="tela-login">
        <h2>Acesso Restrito</h2>
        <p>Digite a senha para gerenciar a loja:</p>
        <input type="password" id="senha-acesso" placeholder="Senha secreta">
        <button onclick="entrarNoPainel()">Entrar no Painel</button>
        <p id="msg-login" style="color: red; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <div id="painel-conteudo">
        
        <div class="painel-container">
            <h2>🛒 Vitrine da Lojinha</h2>
            <form id="form-produto">
                <div class="form-grupo">
                    <label>Nome do Produto:</label>
                    <input type="text" id="nome-produto" required>
                </div>
                <div class="form-grupo">
                    <label>Preço:</label>
                    <input type="text" id="preco-produto" required>
                </div>
                <div class="form-grupo">
                    <label>Escolha a Foto:</label>
                    <input type="file" id="imagem-produto" accept="image/*" required>
                </div>
                <button type="submit" class="btn-salvar" id="btn-salvar-produto">Salvar na Lojinha</button>
            </form>
            <div class="aviso" id="msg-produto"></div>
        </div>

        <div class="lista-produtos">
            <h3 style="color: #d81b60; text-align: center; margin-top: 0;">Itens à venda</h3>
            <div id="lista-produtos-container"><p style="text-align: center;">Carregando... ⏳</p></div>
        </div>

        <hr>

        <div class="painel-container" style="border-top-color: #8e24aa;">
            <h2>🎨 Galeria do Portfólio</h2>
            <form id="form-portfolio">
                <div class="form-grupo">
                    <label>Título da Arte:</label>
                    <input type="text" id="titulo-portfolio" required>
                </div>
                <div class="form-grupo">
                    <label>Escolha a Foto:</label>
                    <input type="file" id="imagem-portfolio" accept="image/*" required>
                </div>
                <button type="submit" class="btn-salvar" style="background-color: #8e24aa;" id="btn-salvar-portfolio">Salvar no Portfólio</button>
            </form>
            <div class="aviso" id="msg-portfolio"></div>
        </div>

        <div class="lista-produtos">
            <h3 style="color: #8e24aa; text-align: center; margin-top: 0;">Artes no Site</h3>
            <div id="lista-portfolio-container"><p style="text-align: center;">Carregando... ⏳</p></div>
        </div>
    </div>

    <script>
        const API_PRODUTOS = "https://back-mariposa.onrender.com/api/produtos";
        const API_PORTFOLIO = "https://back-mariposa.onrender.com/api/portfolio";
        let senhaGlobal = ""; // Guarda a senha enquanto ela estiver na página

        // ==========================================
        // 1. SISTEMA DE LOGIN SIMPLES
        // ==========================================
        function entrarNoPainel() {
            const senhaDigitada = document.getElementById('senha-acesso').value;
            if (!senhaDigitada) return;
            
            senhaGlobal = senhaDigitada; // Salva na memória
            
            // Esconde o login e mostra o painel
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('painel-conteudo').style.display = 'flex';
            
            // Agora sim carrega a lista (não precisa de senha pra ver)
            carregarProdutos();
            carregarPortfolio();
        }

        // ==========================================
        // O COMPRESSOR MÁGICO (AGORA COM A SENHA ENVIADA JUNTO)
        // ==========================================
        function processarFotoEEnviar(arquivoFoto, urlAPI, dadosJSON, botao, elementoMensagem, callbackSucesso) {
            botao.innerText = "Preparando a foto... ⏳";
            elementoMensagem.innerText = "";

            const leitor = new FileReader();
            leitor.onloadend = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;

                    if (width > height) { if (width > 600) { height *= 600 / width; width = 600; } } 
                    else { if (height > 600) { width *= 600 / height; height = 600; } }

                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    dadosJSON.imagem = canvas.toDataURL('image/jpeg', 0.7);
                    botao.innerText = "Salvando... 🚀";

                    try {
                        const resposta = await fetch(urlAPI, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'x-senha-admin': senhaGlobal // MANDA A SENHA AQUI!
                            },
                            body: JSON.stringify(dadosJSON)
                        });

                        if (resposta.ok) {
                            elementoMensagem.style.color = "green";
                            elementoMensagem.innerText = "✅ Salvo com sucesso!";
                            callbackSucesso();
                        } else if (resposta.status === 401) {
                            elementoMensagem.style.color = "red";
                            elementoMensagem.innerText = "❌ Senha Incorreta! Atualize a página e faça login novamente.";
                        } else {
                            elementoMensagem.style.color = "red";
                            elementoMensagem.innerText = "❌ Erro ao salvar.";
                        }
                    } catch (error) {
                        elementoMensagem.style.color = "red";
                        elementoMensagem.innerText = "❌ Erro de conexão.";
                    } finally {
                        botao.innerText = "Salvar";
                    }
                };
            };
            leitor.readAsDataURL(arquivoFoto);
        }

        // ==========================================
        // CÓDIGOS DA LOJINHA (PRODUTOS)
        // ==========================================
        document.getElementById('form-produto').addEventListener('submit', function(e) {
            e.preventDefault();
            const nome = document.getElementById('nome-produto').value;
            const preco = document.getElementById('preco-produto').value;
            const foto = document.getElementById('imagem-produto').files[0];
            processarFotoEEnviar(foto, API_PRODUTOS, { nome: nome, preco: preco }, document.getElementById('btn-salvar-produto'), document.getElementById('msg-produto'), () => {
                document.getElementById('form-produto').reset();
                carregarProdutos();
            });
        });

        async function carregarProdutos() {
            const container = document.getElementById('lista-produtos-container');
            const res = await fetch(API_PRODUTOS);
            const itens = await res.json();
            container.innerHTML = itens.length === 0 ? "<p>Vazio.</p>" : "";
            itens.forEach(item => {
                container.innerHTML += `
                    <div class="item-produto">
                        <div class="item-info"><img src="${item.imagem}"> <div class="item-text"><h4>${item.nome}</h4><p>${item.preco}</p></div></div>
                        <button class="btn-excluir" onclick="excluirItem('${item._id}', API_PRODUTOS, carregarProdutos)">Excluir</button>
                    </div>`;
            });
        }

        // ==========================================
        // CÓDIGOS DO PORTFÓLIO
        // ==========================================
        document.getElementById('form-portfolio').addEventListener('submit', function(e) {
            e.preventDefault();
            const titulo = document.getElementById('titulo-portfolio').value;
            const foto = document.getElementById('imagem-portfolio').files[0];
            processarFotoEEnviar(foto, API_PORTFOLIO, { titulo: titulo }, document.getElementById('btn-salvar-portfolio'), document.getElementById('msg-portfolio'), () => {
                document.getElementById('form-portfolio').reset();
                carregarPortfolio();
            });
        });

        async function carregarPortfolio() {
            const container = document.getElementById('lista-portfolio-container');
            const res = await fetch(API_PORTFOLIO);
            const itens = await res.json();
            container.innerHTML = itens.length === 0 ? "<p>Vazio.</p>" : "";
            itens.forEach(item => {
                container.innerHTML += `
                    <div class="item-produto">
                        <div class="item-info"><img src="${item.imagem}"> <div class="item-text"><h4>${item.titulo}</h4></div></div>
                        <button class="btn-excluir" onclick="excluirItem('${item._id}', API_PORTFOLIO, carregarPortfolio)">Excluir</button>
                    </div>`;
            });
        }

        // ==========================================
        // FUNÇÃO DE EXCLUIR PROTEGIDA
        // ==========================================
        async function excluirItem(id, urlAPI, funcaoAtualizar) {
            if (!confirm(`Tem certeza que deseja excluir?`)) return;
            try {
                const res = await fetch(`${urlAPI}/${id}`, { 
                    method: 'DELETE',
                    headers: { 'x-senha-admin': senhaGlobal } // MANDA A SENHA AQUI TAMBÉM
                });
                
                if (res.ok) { 
                    funcaoAtualizar(); 
                } else if (res.status === 401) {
                    alert('❌ Acesso Negado: Senha incorreta!');
                } else {
                    alert('Erro ao excluir.');
                }
            } catch (erro) { alert('Erro de conexão.'); }
        }
    </script>
</body>
</html>
