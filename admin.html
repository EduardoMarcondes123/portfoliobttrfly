<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Chefe | Atelier Mariposa</title>
    <style>
        /* Estilo bonitinho e exclusivo pro painel */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec; /* Rosa bem clarinho */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .painel-container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #d81b60;
        }
        .form-grupo {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box; /* Pra não vazar do limite */
        }
        button {
            background-color: #d81b60;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #ad1457;
        }
        .aviso {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="painel-container">
        <h2>Painel da Chefe 🦋</h2>
        <p>Cadastre uma nova joia no Atelier</p>

        <form id="form-produto">
            <div class="form-grupo">
                <label for="nome">Nome do Produto:</label>
                <input type="text" id="nome" placeholder="Ex: Chaveiro Borboleta Rosa" required>
            </div>

            <div class="form-grupo">
                <label for="preco">Preço:</label>
                <input type="text" id="preco" placeholder="Ex: R$ 15,00" required>
            </div>

            <div class="form-grupo">
                <label for="imagem">Link da Imagem:</label>
                <input type="url" id="imagem" placeholder="Cole o link da foto aqui" required>
            </div>

            <button type="submit" id="btn-salvar">Salvar no Banco de Dados</button>
        </form>

        <div class="aviso" id="mensagem-status"></div>
    </div>

    <script>
        // O LINK DO SEU BACK-END NO RENDER
        const API_URL = "https://back-mariposa.onrender.com/api/produtos";

        document.getElementById('form-produto').addEventListener('submit', async function(event) {
            event.preventDefault(); // Impede a página de recarregar do zero

            const btnSalvar = document.getElementById('btn-salvar');
            const mensagem = document.getElementById('mensagem-status');
            
            // Pega os valores que ela digitou
            const nome = document.getElementById('nome').value;
            const preco = document.getElementById('preco').value;
            const imagem = document.getElementById('imagem').value;

            btnSalvar.innerText = "Salvando... ⏳";
            mensagem.innerText = "";

            try {
                // Manda os dados pro Back-end usando o método POST
                const resposta = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nome: nome, preco: preco, imagem: imagem })
                });

                if (resposta.ok) {
                    mensagem.style.color = "green";
                    mensagem.innerText = "✅ Joia cadastrada com sucesso! Ela já está no site oficial.";
                    document.getElementById('form-produto').reset(); // Limpa o formulário
                } else {
                    mensagem.style.color = "red";
                    mensagem.innerText = "❌ Ops! Deu um erro ao salvar.";
                }
            } catch (error) {
                mensagem.style.color = "red";
                mensagem.innerText = "❌ Servidor dormindo! Tente clicar em Salvar de novo.";
            } finally {
                btnSalvar.innerText = "Salvar no Banco de Dados";
            }
        });
    </script>
</body>
</html>
